  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #101012;
      --surface: #131316;
      --border: rgba(244, 245, 248, 0.06);
      --border-hover: rgba(244, 245, 248, 0.12);
      --text: #f7f8f8;
      --text-secondary: #8a8f98;
      --text-dim: rgba(244, 245, 248, 0.3);
      --accent: #FF1744;
      --accent-hover: #ff3d6b;
      --accent-glow: rgba(255, 23, 68, 0.06);
      --mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", "Consolas", monospace;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--sans);
      font-feature-settings: "cv01", "ss03";
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: var(--accent);
      color: #fff;
    }

    a { color: var(--text-secondary); text-decoration: none; transition: color 0.16s var(--ease); }
    a:hover { color: var(--text); }

    /* ── Logo (top right) ── */
    .logo {
      position: fixed;
      top: 24px;
      right: 32px;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 590;
      color: var(--text);
      letter-spacing: -0.01em;
      z-index: 10;
    }
    .logo span { color: var(--accent); }

    /* ── Main layout ── */
    .page {
      display: flex;
      align-items: center;
      height: 100vh;
      padding: 0 48px;
      gap: 56px;
    }

    /* ── Left: video ── */
    .video-side {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .demo-video {
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
      box-shadow:
        0 0 120px var(--accent-glow),
        0 32px 64px rgba(0, 0, 0, 0.5);
    }
    .demo-video video {
      display: block;
      width: 100%;
      height: auto;
    }

    .demo-fallback {
      display: none;
      aspect-ratio: 1;
      text-align: center;
      padding: 32px;
    }
    .demo-fallback-tagline {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text-dim);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .demo-video.no-video video { display: none; }
    .demo-video.no-video .demo-fallback { display: block; }

    /* ── Right: text ── */
    .text-side {
      flex: 1;
      min-width: 0;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .headline {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.55;
      letter-spacing: -0.01em;
      color: var(--text);
      text-wrap: pretty;
    }
    .headline em {
      font-style: normal;
      color: var(--accent);
    }

    .btn-github {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-radius: 12px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 590;
      letter-spacing: -0.01em;
      background: var(--accent);
      color: #fff;
      transition: background 0.16s var(--ease), box-shadow 0.16s var(--ease);
      border: none;
      width: fit-content;
      cursor: pointer;
    }
    .btn-github:hover {
      background: var(--accent-hover);
      color: #fff;
      box-shadow: 0 4px 24px rgba(255, 23, 68, 0.2);
    }
    .btn-github svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .contact {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
      letter-spacing: -0.01em;
    }
    .contact a {
      color: var(--text-secondary);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2.5px;
      text-decoration-color: var(--border-hover);
      transition: color 0.16s var(--ease), text-decoration-color 0.16s var(--ease);
    }
    .contact a:hover {
      color: var(--text);
      text-decoration-color: var(--text-secondary);
    }

    .license {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    /* ── Responsive: stack on small screens ── */
    @media (max-width: 860px) {
      html, body { overflow: auto; height: auto; }
      .logo {
        position: relative;
        top: auto;
        right: auto;
        padding: 20px 24px 0;
        text-align: right;
      }
      .page {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 24px 24px 48px;
        gap: 40px;
        justify-content: center;
      }
      .video-side { width: 100%; }
      .demo-video { max-width: 100%; }
      .text-side {
        max-width: 100%;
        text-align: center;
        align-items: center;
      }
    }
  </style>
</head>
<body>

<div class="logo"><span>&gt;</span>clawterm</div>

<main class="page">
  <div class="video-side">
    <div class="demo-video" id="demoVideo">
      <video autoplay loop muted playsinline>
        <source src="screenshots/Clawterm720.mp4" type="video/mp4">
      </video>
      <div class="demo-fallback">
        <p class="demo-fallback-tagline">Video demo unavailable</p>
      </div>
    </div>
  </div>

  <div class="text-side">
    <p class="headline">
      Come collaborate with me on <em>Clawterm</em> &mdash; I'm making the best terminal for running many instances of Claude Code at once.
    </p>

    <a href="https://github.com/clawterm/clawterm" class="btn-github">

      View on GitHub
    </a>

    <p class="contact">
      Get in touch &mdash; <a href="mailto:jorgensenaxel@gmail.com">jorgensenaxel@gmail.com</a>
    </p>

    <p class="license">MIT License &middot; Tauri 2 + xterm.js</p>
  </div>
</main>

<script>
  var v = document.querySelector('#demoVideo video');
  v.addEventListener('error', function() {
    document.getElementById('demoVideo').classList.add('no-video');
  });
  v.querySelector('source').addEventListener('error', function() {
    document.getElementById('demoVideo').classList.add('no-video');
  });
</script>

</body>
</html>
