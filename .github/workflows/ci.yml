name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check version sync
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PKG" != "$TAURI" ] || [ "$PKG" != "$CARGO" ]; then
            echo "::error::Version mismatch: package.json=$PKG tauri.conf.json=$TAURI Cargo.toml=$CARGO"
            exit 1
          fi
          echo "All versions in sync: $PKG"
      # Run frontend checks only (lint, format, test, typecheck) — cargo test
      # is handled by the backend job on its target platform.
      - run: npm run lint && npm run format:check && npm run test && npx tsc --noEmit
      - run: npm run build

  backend:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
      - run: cd src-tauri && cargo clippy --target ${{ matrix.target }} -- -D warnings
      - run: cd src-tauri && cargo test --target ${{ matrix.target }}
