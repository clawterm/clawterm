name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches package version $PKG"
      - name: Check version sync
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PKG" != "$TAURI" ] || [ "$PKG" != "$CARGO" ]; then
            echo "::error::Version mismatch: package.json=$PKG tauri.conf.json=$TAURI Cargo.toml=$CARGO"
            exit 1
          fi
          echo "All versions in sync: $PKG"
      # Frontend checks only — cargo test runs as part of each platform build.
      # Using ubuntu-latest saves ~30-60s provisioning vs macos-latest.
      - run: npm run lint && npm run format:check && npm run test && npx tsc --noEmit
      - run: npm run build

  build:
    needs: check
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: universal-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - run: npm ci

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version (between its header and the next ## [...])
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[$VERSION\]/d;/^## \[/d;p;}" CHANGELOG.md)
          # Trim leading/trailing blank lines (awk is portable across macOS and Linux)
          NOTES=$(echo "$NOTES" | awk 'NF{p=1} p' | awk '{lines[NR]=$0} END{for(i=NR;i>=1;i--)if(lines[i]!=""){last=i;break} for(i=1;i<=last;i++)print lines[i]}')
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full history."
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri bundle
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          # Apple code signing and notarization — uncomment when secrets are configured:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode signing — uncomment when secrets are configured:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Clawterm ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: "--target ${{ matrix.target }}"

      - name: Generate and upload SHA256 checksums
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACTS='${{ steps.tauri.outputs.artifactPaths }}'
          CHECKSUM_FILE="checksums-${{ matrix.target }}.txt"
          hash_cmd() { if command -v sha256sum &>/dev/null; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          echo "$ARTIFACTS" | jq -r '.[]' | while read -r file; do
            [ -f "$file" ] && hash_cmd "$file" | awk '{print $1 "  " FILENAME}' FILENAME="$(basename "$file")"
          done > "$CHECKSUM_FILE"
          if [ -s "$CHECKSUM_FILE" ]; then
            gh release upload "${{ github.ref_name }}" "$CHECKSUM_FILE" --repo "${{ github.repository }}" --clobber
          fi

  # Publish the draft release only after ALL platform builds succeed.
  # This prevents users from seeing a partial release with missing platforms.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
